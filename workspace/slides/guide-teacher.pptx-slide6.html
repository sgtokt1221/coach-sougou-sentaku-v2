<!DOCTYPE html><html><head><style>
html{background:#fff}
body{width:720pt;height:405pt;margin:0;padding:0;background:#F8FAFC;font-family:Arial,sans-serif;display:flex;flex-direction:column}

</style></head><body>
    <div style="background:#1E3A5F;padding:16pt 40pt"><h2 style="color:white;font-size:20pt;margin:0">大学データ管理</h2></div>
    <div style="margin:10pt 24pt">
      <div style="display:flex;gap:16pt">
        <div style="flex:1;background:white;border-radius:8pt;padding:16pt">
          <p style="color:#1E3A5F;font-size:12pt;font-weight:bold;margin-bottom:8pt">対応大学（23校・189学部）</p>
          <ul style="color:#64748B;font-size:10pt">
            <li>旧帝大7校</li>
            <li>早慶上智3校</li>
            <li>関関同立4校</li>
            <li>MARCH5校</li>
            <li>産近甲龍4校</li>
          </ul>
        </div>
        <div style="flex:1;background:white;border-radius:8pt;padding:16pt">
          <p style="color:#1E3A5F;font-size:12pt;font-weight:bold;margin-bottom:8pt">編集可能データ</p>
          <ul style="color:#64748B;font-size:10pt">
            <li>基本情報（名称・URL）</li>
            <li>学部ごとのAP</li>
            <li>選考方法・日程</li>
            <li>面接傾向（形式・雰囲気・頻出テーマ）</li>
            <li>出願要件（GPA・資格）</li>
          </ul>
        </div>
      </div>
      <div style="background:#FEF3C7;border-radius:8pt;padding:12pt;margin-top:10pt">
        <p style="color:#92400E;font-size:10pt"><b>毎年更新が必要</b>：募集要項は毎年変わるため、年度切替時にデータ更新をお願いします</p>
      </div>
    </div></body></html>
