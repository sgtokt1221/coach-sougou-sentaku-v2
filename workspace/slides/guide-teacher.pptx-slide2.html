<!DOCTYPE html><html><head><style>
html{background:#fff}
body{width:720pt;height:405pt;margin:0;padding:0;background:#F8FAFC;font-family:Arial,sans-serif;display:flex;flex-direction:column}
.box{background:white;border-radius:8pt;padding:14pt;border:1pt solid #E2E8F0}
</style></head><body>
    <div style="background:#1E3A5F;padding:16pt 40pt"><h2 style="color:white;font-size:20pt;margin:0">システム概要</h2></div>

          <li>自己分析ワークショップ</li>

          <li>小論文添削（OCR＋AI）</li>

      </div>

        <ul style="color:#64748B;font-size:9pt">

        </ul>
      </div>
      <div class="box" style="flex:1">
        <p style="color:#0D9488;font-size:12pt;font-weight:bold;margin-bottom:6pt">Superadmin</p>
        <ul style="color:#64748B;font-size:9pt">
          <li>管理者アカウント管理</li>
          <li>生徒の担当割り当て</li>
          <li>全体統計ダッシュボード</li>
          <li>ロールベースアクセス制御</li>
        </ul>
      </div>
    </div></body></html>
