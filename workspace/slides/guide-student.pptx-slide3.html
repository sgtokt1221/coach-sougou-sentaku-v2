<!DOCTYPE html><html><head><style>
html{background:#fff}
body{width:720pt;height:405pt;margin:0;padding:0;background:#F8FAFC;font-family:Arial,sans-serif;display:flex;flex-direction:column}
.step{display:flex;align-items:flex-start;gap:10pt;margin:8pt 0}.num{background:#0D9488;color:white;border-radius:50%;width:24pt;height:24pt;display:flex;align-items:center;justify-content:center;font-size:12pt;font-weight:bold;flex-shrink:0}
</style></head><body>
    <div style="background:#0D9488;padding:16pt 40pt"><h2 style="color:white;font-size:20pt;margin:0">Step 1：自己分析ワークショップ</h2></div>
    <div style="display:flex;margin:16pt 30pt;gap:20pt">
      <div style="flex:1.2">
        <p style="color:#1E3A5F;font-size:11pt;font-weight:bold;margin-bottom:8pt">7つのステップでAIと対話しながら自分を深掘り</p>
        <div class="step"><div class="num"><p style="color:white;font-size:11pt">1</p></div><p style="color:#64748B;font-size:10pt;margin:2pt 0">価値観を見つける</p></div>
        <div class="step"><div class="num"><p style="color:white;font-size:11pt">2</p></div><p style="color:#64748B;font-size:10pt;margin:2pt 0">強みを言語化する</p></div>
        <div class="step"><div class="num"><p style="color:white;font-size:11pt">3</p></div><p style="color:#64748B;font-size:10pt;margin:2pt 0">課題と成長ストーリー</p></div>
        <div class="step"><div class="num"><p style="color:white;font-size:11pt">4</p></div><p style="color:#64748B;font-size:10pt;margin:2pt 0">興味・関心の深掘り</p></div>
        <div class="step"><div class="num"><p style="color:white;font-size:11pt">5</p></div><p style="color:#64748B;font-size:10pt;margin:2pt 0">将来ビジョン</p></div>
        <div class="step"><div class="num"><p style="color:white;font-size:11pt">6</p></div><p style="color:#64748B;font-size:10pt;margin:2pt 0">アイデンティティ統合</p></div>
        <div class="step"><div class="num"><p style="color:white;font-size:11pt">7</p></div><p style="color:#64748B;font-size:10pt;margin:2pt 0">AP接続文の作成</p></div>
      </div>
      <div style="flex:0.8;background:#F0FDFA;border-radius:8pt;padding:14pt">
        <p style="color:#0D9488;font-size:11pt;font-weight:bold;margin-bottom:6pt">完了すると...</p>
        <ul style="color:#64748B;font-size:10pt">
          <li>面接で使える「自分の軸」が明確に</li>
          <li>面接評価で個別アドバイスが出る</li>
          <li>志望理由書の土台ができる</li>
        </ul>
      </div>
    </div></body></html>
