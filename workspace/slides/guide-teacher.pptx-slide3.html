<!DOCTYPE html><html><head><style>
html{background:#fff}
body{width:720pt;height:405pt;margin:0;padding:0;background:#F8FAFC;font-family:Arial,sans-serif;display:flex;flex-direction:column}

</style></head><body>
    <div style="background:#1E3A5F;padding:16pt 40pt"><h2 style="color:white;font-size:20pt;margin:0">生徒管理</h2></div>
    <div style="margin:10pt 24pt">
      <div style="display:flex;gap:16pt">
        <div style="flex:1;background:white;border-radius:8pt;padding:16pt">
          <p style="color:#1E3A5F;font-size:12pt;font-weight:bold;margin-bottom:8pt">生徒一覧（/admin/students）</p>
          <ul style="color:#64748B;font-size:10pt">
            <li>名前・志望校で検索</li>
            <li>ステータスBadge表示</li>
            <li>スコア推移でソート</li>
            <li>アラートフラグ自動算出</li>
          </ul>
        </div>
        <div style="flex:1;background:white;border-radius:8pt;padding:16pt">
          <p style="color:#1E3A5F;font-size:12pt;font-weight:bold;margin-bottom:8pt">生徒詳細（/admin/students/[id]）</p>
          <ul style="color:#64748B;font-size:10pt">
            <li>プロフィール＆志望校</li>
            <li>面接・小論文スコア推移グラフ</li>
            <li>弱点一覧テーブル</li>
            <li>添削・面接履歴</li>
          </ul>
        </div>
      </div>
      <div style="background:#F0FDFA;border-radius:8pt;padding:14pt;margin-top:12pt">
        <p style="color:#0D9488;font-size:11pt;font-weight:bold">担当生徒スコーピング</p>
        <p style="color:#64748B;font-size:10pt">admin/teacherは自分の担当生徒のみ表示。superadminは全生徒を閲覧可能。</p>
      </div>
    </div></body></html>
